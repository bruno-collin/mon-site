<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agrandir une photo au clic</title>
<style>

/* Style pour la modale */
.modal {
display: none;
position: fixed;
z-index: 1;
left: 0;
top: 0;
width: 100%;
height: 100%;
background-color: rgba(0, 0, 0, 0.9);
overflow: auto;
}

.modal-content {
margin: auto;
display: block;
max-width: 90%;
max-height: 90%;
margin-top: 5%;
}

.close {
position: absolute;
top: 15px;
right: 35px;
color: white;
font-size: 40px;
font-weight: bold;
cursor: pointer;
}

/* Style pour les images miniatures */
.thumbnail {
cursor: pointer;
transition: transform 0.3s;
}

.thumbnail:hover {
transform: scale(1.05);
}
</style>
</head>
<body>
<!-- Image miniature -->
<img src="images-toile/toile-001.jpg" alt="Ma photo" onclick="openModal('images-toile/toile-001.jpg')">

<!-- Fenêtre modale -->
<div id="myModal" >
<span onclick="closeModal()">&times;</span>
<img id="modalImage">
</div>

<script>
// Fonction pour ouvrir la modale
function openModal(imageSrc) {
const modal = document.getElementById(“myModal”);
const modalImg = document.getElementById(“modalImage”);
modal.style.display = “block”;
modalImg.src = imageSrc;
}

// Fonction pour fermer la modale
function closeModal() {
const modal = document.getElementById(“myModal”);
modal.style.display = “none”;
}

// Fermer la modale si on clique en dehors de l'image
window.onclick = function(event) {
const modal = document.getElementById(“myModal”);
if (event.target === modal) {
modal.style.display = “none”;
}
}
</script>
</body>
</html>

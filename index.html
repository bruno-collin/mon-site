.home-item img{

}

.home-item:hover img{transform:scale(1.05)}

.home-title{

 bottom:20px;
 width:100%;
 text-align:center;
 background:transparent;
 color:black;
 padding:10px 0;
 border-radius:6px;

}

.button {
 background: #333;
 color: #fff;
 padding: 10px 20px;
 text-decoration: none;
 border-radius: 6px;

}

.footer-buttons {
 display: flex;
 justify-content: center;
 gap: 20px;
 margin-bottom: 20px;
}

footer{text-align:center;padding:30px;border-top:1px solid #333;margin-top:60px;font-size:14px;opacity:0.7}
</style>
</head>
